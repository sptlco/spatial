name: Build

on:
  workflow_dispatch:
  push:
    branches:
      - "*"
    tags-ignore:
      - "*"

permissions:
  contents: write
  issues: write
  pull-requests: write
  packages: write

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.x"

      - name: Restore
        working-directory: packages/cloud
        run: dotnet restore

      - name: Build
        working-directory: packages/cloud
        run: dotnet build -c Release

      - name: Test
        working-directory: packages/cloud/Tests
        run: dotnet test -c Release --no-build --verbosity normal --filter Category=Unit --logger "trx;LogFileName=results.trx"
        env:
          ASPNETCORE_ENVIRONMENT: Build

      - name: Report
        uses: dorny/test-reporter@v3
        if: always()
        with:
          name: Unit Tests
          report-title: Unit Tests
          path: packages/cloud/Tests/TestResults/results.trx
          reporter: dotnet-trx
          fail-on-error: true

  integration:
    name: Integration
    runs-on: ubuntu-latest
    needs: build

    services:
      mongo:
        image: mongo:8
        ports:
          - 27017:27017

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.x"

      - name: Restore
        working-directory: packages/cloud
        run: dotnet restore

      - name: Build
        working-directory: packages/cloud
        run: dotnet build -c Release --no-restore

      - name: Test
        working-directory: packages/cloud/Tests
        run: dotnet test -c Release --no-build --verbosity normal --filter Category=Integration --logger "trx;LogFileName=results.trx"
        env:
          ASPNETCORE_ENVIRONMENT: Build

      - name: Report
        uses: dorny/test-reporter@v3
        if: always()
        with:
          name: Integration Tests
          report-title: Integration Tests
          path: packages/cloud/Tests/TestResults/results.trx
          reporter: dotnet-trx
          fail-on-error: true
